body:
  text: 正文時行伏陰論乃田云槎先生所著甲寅年自友人處得之蓋以伏陰之為病有似霍亂而實非霍亂倘認證不確方法錯謬其害有不可勝言者余於此症素懷疑慮既得斯篇若獾珍實故特録呈以分同好焉時行伏陰總論天地之陽氣升於春浮於夏降於秋沉於冬往往事與陰氣互上下是故春溫夏熱秋涼冬寒為四序之常四序失則寒暑愆非其時而有其氣則為異氣異氣未有不病人者春夏陽氣開張之際適值陰雨淫盛濕盛則陽氣微而寒氣生寒濕相搏結成一團陰霾之氣人受之則上客於肺中客於脾下客於腎即病則為寒濕如不即病其邪必伏於經絡則為伏陰直至夏秋陰氣內盛陽氣外泄久伏經絡之邪後陰而化發端於膜原膜原在胸膺之內夾脊之前正當胃交經關之所諸經之總會也陰邪踞此壅遏氣機清不能升濁不能降三焦表裹營沖氣血皆為所阻於是胸中不藥頭微眩四末微麻小便不通下利清水嗢嗢欲嘔一經嘔吐聲瘖耳鳴面麝肌消目眶陷目睛冒渴飲熱湯四肢逆冷脈微或伏轉筋疼痛冷汗自出有似霍亂變則嘔止而噦或噫厄或咳或懊憹或心下痞塞而肢體若冰甚則心中如焚渴欲冷飲搧扇不知風飲冰不知冷臥地不起大要此症以小便通利則生不通則死其間有僅下利而不嘔吐者陰邪就下為病也有朝發暮死者重感於邪也又有觸發舊病而並病者有誤針藥而成危候者有病後失調而終婦冥路者不可言狀初治之法當以溫中通陽為第一義大忌苦寒助邪消克伐正如神形已奪切勿與芳香投針石以氣血不可再奪故也或當轉筋危急則湯尉之法最為穩捷至於變症用藥或宜補通在臨證者細心研究耳伏陰霍亂辨伏陰一症古書罕言而近代病此最多因其嘔利轉筋頗似霍亂世每以霍亂治之夫霍亂之義揮撩亂皆緣寒熱不調飲食不節以致風寒暑濕之邪與宿食冷滯相搏清濁混淆亂於腸胃而脾胃之氣困矣為病則心腹絞痛嘔利並作內亂極而之外則為轉筋疼痛大抵霍亂嘔利必有兼見之狀時疫亦然如頭痛發熱惡風惡寒者為感風寒而病也身熱面渴氣粗喘悶者為感暑邪而病也是霍亂固有風寒暑濕之分故治法有或清或溫之不同也若夫伏陰之為病蓋由春夏感受寒濕陰邪不即發伏於肺脾腎三經孫絡乘人陰氣內盛之時遂後陰化而發也其為病先利而後嘔並無腹痛視霍亂之卒然心腹絞痛嘔吐而利者有間霍亂之發病則一井之中僅見一二伏陰之發專在夏秋病則遠近一律如傳疫傳疫然霍亂髮暴而退速伏陰發緩而退不易霍亂脈大為可治微細恆難治伏陰脈細或伏是其常候惟陽將通脈喜微續若暴復洪大每不可治此較之源異而脈殊故其名不可不辨也古人所謂治病必先辨名識得為名而後可以究病因察病狀則立方用藥自有把柄雖千變萬化卻有一定之法茲因近代寒濕伏邪為病甚巨奈人多以霍亂目之而方法錯亂遺人夭殃故特辨正病名俾誤者知改耳原病一伏陰之為病先利而後嘔脈微欲絶甚則脈伏聲按此揭時行伏陰脈症為伏陰病之提綱後凡言伏陰病者皆指此脈症而言也先利而後嘔正與既吐且利之霍亂症有間二伏陰病胸中不藥頭微眩四末微麻小便不通下利清水嗢嗢欲嘔者蘇砂平胃散主之聲按伏陰初起止方主之理中湯亦主之又伏陰之邪本先伏於肺脾腎三經孫絡而太陰少陰原無頭痛一症故病伏陰者僅頭微眩而不疼痛也實有不盡然者何也蓋肺既與大腸相表裹脾既與胃相表裹腎既與膀胱相表裹豈有臟病而不纍腑裹病而不及表者乎不過較他症頭痛稍輕耳蘇砂平胡散溫中通陽法蒼朮二錢厚朴姜炒一錢陳皮一錢甘草一錢蘇葉一錢砂仁一錢生薑一錢大棗三枚捭水三鍾煎去渣分二次溫飲之不愈再服一劑聲按醫理與地理有關係焉如我國東南卑濕濕重寒輕西北高亢寒重濕輕則蘇砂姜附陳皮等分量宜有進退加減法下利白水倍紫蘇加紅豆蔻本肺家藥也且辛溫之性能流通三焦溫暖脾胃三焦利脾胃連則諸症自平故也下利黃水倍蒼朮者燥胃強脾升陽氣也下利黑水或純清水倍砂仁者溫中宮通腎陽也若加茯苓以助之其效尤速服藥不受加童便者因濁邪踞於膈上引以童便使之濁婦道也又下利白水前有嘔吐清水加桂枝一錢漿不得受加乾姜八分與後第三條重復又有轉筋疼痛加牛膝二錢艾絨一錢與後第五條重復故刪去之三伏陰病嘔吐清水耳鳴瘖四肢逆冷者蘇砂平胃散加桂枝水漿不得受者再加乾姜四伏陰病面塵肌消目眶陷目睛冒渴飲熱湯四肢逆冷者附子理中湯主之聲按此為伏陰症之重病目睛冒者請睛不能視特如有薄紙遮蓋也又吳氏以喜飲水不喜飲水而辨霍亂症之屬陰屬陽是霍亂症原有陰陽之分非辨伏陰與霍亂也故不飲水者理中湯主之欲飲水者五苓散主之若誤認此渴欲飲水之伏陰症為五苓散所主之霍亂症則失之遠矣附子理中湯復陽消陰法附子炮二錢人參一錢白朮一錢乾姜一錢炙草一錢水三鍾煎去渣分二次服之不愈來愈再依前煎服加減法嘔加半夏一錢薑汁一匙沖服腹痛加木香一錢臍下動氣去朮加桂六分心下悸加茯苓二錢妊婦加當歸芎窮濕盛易白朮為蒼朮呢逆加丁香柿蒂各一錢聲按理中湯原為溫中散寒而設蓋胃陽傷則吐脾陽傷則瀉因吐瀉而致面塵肌塵肌消目眶下陷則脾胃困憊極矣濕不瀰漫目不冒寒不徹外肢不厥陰盛陽衰竟致不能蒸騰津液則渴欲熱飲故方中有人參以補氣益脾白朮以燥濕健脾甘草和中以培土乾姜溫胃以散寒合之通中有守守中有通遮內外之陽氣來復而群陰自消矣若甚寒為患則又非純陽之附子不為功嘔吐則加半夏薑汁以散寒而降逆腹痛則加木香以理氣而調中臍下動氣去朮加桂者因白朮補氣肉桂瀉奔豚也心下悸如伏苓者飲停則悸加之以利水而寧心也妊婦加歸芎以散寒和血厄逆加丁香柿蒂以利痰行氣濕盛以蒼朮易白朮者因白朮之甘溫和平不若蒼朮之辛烈燥濕而強胃且能開鬱以升胃陽也嘔加半夏前有轉筋加牛膝二錢艾絨二錢亦因重復刪之五伏陰病轉筋疼痛者蘇砂平胃散主之附子理中湯亦主之均宜加牛膝艾絨危急者用湯慰法聲按濕鬱於經絡以致筋如轉索即吳氏所謂俗名轉筋火者其實乃伏陰與寒濕相搏也又肝主筋筋既被寒濕搏急而牽轉疼痛即當於溫通方中加桂枝以溫經通筋而和之也蓋桂花枝既善平肝又善通陽誠以一物而具牛膝艾絨之功也後有驗案可考若肢厥寒甚則又非純陽之附子不足以破陰氣而發陽光故附子理中湯亦主之湯尉法蓼梗並葉根一大束水煎湯蒸轉筋痛處得汗則愈蔥白一握搗作餅貼痛處以艾絨如荔核大於蔥餅上火然灸之得暖則愈小麥麩升許酒調焙熱布包線札尉柔痛處冷則易之以愈為度以上三法屢用屢驗必須內服通陽方劑以逐其邪否則毒復陷裹反成危候也六伏陰病冷汗自出者陽復則止聲按此可與理中湯或蘇砂平胃散加桂枝二錢更隹七伏陰病法當嘔今反不嘔者必腰痛或面赤腹痛乾嘔咽痛利止脈不出者通脈四逆湯主之聲按止乃腎家虛寒伏邪就下為患也故不嘔而腰痛又陰盛格陽於外故面赤而咽痛中寒凝聚故腹痛而乾嘔利止陽似來復而脈不出者其陽仍未通也故主以通脈四逆湯通脈四逆湯甘熱回陽法乾姜二錢附子二錢甘草一錢水二鍾煎去渣溫服脈不出者再依前法煎股變症一伏陽病嘔利止厥回而噦者義胃湯主之半夏陳皮湯亦主之若厥不回而乾嘔者可與橘皮湯養胃湯養胃潤枯法人參一錢沙參二錢萎蕤二錢石斛二錢先煎出汁灸甘草一錢法半夏八分大棗三枚加減法治胃虛津枯之厄逆加刀豆子一錢煆用新瘥不欲食品店喜飲者加白芍二錢半夏橘皮湯溫胃散水滌痰降氣法法半夏二錢陳皮一錢茯苓一錢人參一錢炙甘草一錢乾姜一錢大棗三枚橘皮湯通陽消陰宣胃降逆法陳皮二錢生薑四錢二伏陰病嘔利止心下痞鞭噫氣不除者可與代赭石覆花湯代赭石旋覆花湯補中宣氣鎮逆滌痰法代赭石一錢旋覆花二錢絹包人參二錢炙甘草一錢半夏二錢生薑一錢大棗三枚三伏陰病嘔利後胃家虛寒而厄者與附子理中湯加丁香柿蒂胃家虛熱而厄者與橘皮竹茹湯胃虛痰喘者與丁香柿蒂湯橘皮竹茹湯清補止厄法陳皮一錢五分竹茹一錢人參一錢灸甘草一錢大棗三枚生薑八分丁香柿蒂湯溫中降逆法丁香一錢柿蒂一錢人參一錢陳皮一錢法半夏二錢茯苓二錢灸甘草八分生薑一錢四伏陰病嘔利後頭汗出微喘厄聲連連者急與參附湯調之聲按此乃真陽將脫之危候也參附湯人參三錢製附子三錢刀豆粉四錢刀豆子煆存性研二錢五伏陰病嘔利止小便不通者為未愈六伏陰諸症除小便不通者不可與五苓散可與腎氣湯聲按腎氣渥即金匱腎氣丸作湯用以扶陽化氣也七伏陰病欲解時小便必通利聲按小便通利陽和之象也伏陰病最喜陽和陽和則生録驗案數則庚申歲友人塢云菴之子在功年十五一日忽患下利清水既而嘔吐大作四末微麻醫以霍亂治之不效其父求診於餘六脈皆伏四肢劂冷水漿不得受沾唇吐細詢之謂先利後嘔皆系清水起即小便不通並前數日即覺胸中不快口似多涎常啖極鹽之食物以攝之餘曰此乃伏陰重症也雖面塵肌消目眶將陷幸臥蠶未落尚屬可治再遲一時則不可為矣為擬二方先用乾姜一錢法夏夠來用溫水浸洗數次一錢煎湯去渣加薑汁一匙童便一酒杯於甫吐後細細溫飲下其吐即止繼進以蘇砂平胃散去生薑蒼朮改用三錢加乾姜一錢桂技一錢五分茯苓二錢煎湯溫之一劑利止脈見惟四肢猶冷少腹作痛小便仍不通再投以附子理中湯加肉桂八分一劑諸症悉除但昏昏欲睡不思飲食詢之他無所苦脈亦和又以溫補緩劑以善其後遂全愈辛酉暑假歸里有某雇工年二十一於六月下旬途中忽患下利約十分鐘一次及抵家大吐不止轉筋疼痛四肢拘急延余診之其脈甚微詢之謂前數日尚覺四肢痠軟胸悶不暢遂投以蘇砂平胃散將分量加重並加桂枝二錢茯苓二錢一劑稍輕次日復診之其脈仍沉遲腹中痛若有所結遂與以求中湯蒼朮三錢服一劑諸症皆退惟胸中不舒時作厄逆又進以生赭石思細先煎三錢野臺參二錢清半夏一錢半灸甘草一錢廣陳皮一錢加薑棗煎湯連服二劑全愈本年即民國十一年夏秋間育溪附近伏陰症流行甚盛六月中旬農人王腎林年三十許患瀉利清水吐出之水微黃下午七點鐘詢方於余余秉燭就之其脈俱無四肢厥逆轉筋疼痛並口渴而喘目冒聲瘖言不辨前醫朱某諉為不治余曰此伏陰症也幸胸前猶溫尚有一綿可救急施以湯尉法其轉筋遂止進以漂蒼朮五錢沒厚朴薑汁炒二錢灸甘草一錢木香一錢乾姜一錢砂仁一錢半赭石軋細先煎二錢臺參二錢附子一錢煎湯服之約半句鍾陽回汗出小便通利而喘亦就平及其盡劑而病霍然矣余歸就寢鐘鳴十二乃子時也六月三十日余方就診戚家不意長兒大新現年十三歲大泄不止及余回家而吐亦作矣其脈沉緊而遲四末微麻頭痛身熱無汗口渴此伏陰而兼外感也投以急救回生丹此方系張壽甫先生所創載在醫學衷中參西緑本年暑假內余按法制有數劑用之無不獲效小兒此症雖屬伏陰因有兼症又先生謂此丹服之可溫裹得汗故與之後可知無論伏陰霍亂其病初起時可先與此丹令其得汗以減殺其勢而後再分途治之可也若系伏陰症先與以先生所制衛生防疫寶丹更妙須臾汗出吐瀉之勢亦稍緩繼與以漂蒼朮三錢西砂仁一錢灸甘草一錢蘇葉一錢厚朴一錢五分枳谷二錢廣皮一錢薄荷八分加薑棗煎湯服之未盡劑而愈鄰村佟某之子甫三齡於五月前患腹痛泄瀉經他醫治愈至七月前症復作兼嘔清水面色蒼白前醫治之罔效其父求診於余肢冷嘲熱諷肌削不時吐瀉兼四肢搐搦與以蘇砂平胃散加桂枝八分一劑病若失以上數症均伏陰為患余依田氏之法出八治之皆獲全愈益信其言之足微也
